services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cos_agent
    ports:
      # 5433 vermeidet Konflikte mit lokalem Postgres auf 5432
      - "5433:5432"
    volumes:
      - cos_agent_pgdata:/var/lib/postgresql/data
      - ./backend/db/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  cos_agent_pgdata:
